<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="QtEasyTier Mobile - EasyTier 组网客户端">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QtEasyTier Mobile</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      color: #66ccff;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 18px;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
    }
    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(102, 204, 255, 0.2);
      border-top-color: #66ccff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.remove();
      }
    });
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>QtEasyTier Mobile 加载中...</span>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
